services:
  - type: web
    name: ad-report-tool
    runtime: python
    buildCommand: |
      pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
