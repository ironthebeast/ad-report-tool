name: Keep Streamlit App Alive

on:
  schedule:
    # 매 14분마다 실행 (GitHub Actions 부담 최소화)
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake up Streamlit App
        run: |
          # Streamlit Cloud는 303 리다이렉트 후 JS가 필요하므로
          # curl만으로는 완전한 wake-up이 불가능하지만,
          # TCP 연결 자체가 앱 컨테이너를 깨우는 데 도움이 됨
          curl -s -L -o /dev/null --max-time 60 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://ad-report.streamlit.app/" || true

          curl -s -o /dev/null --max-time 30 \
            "https://ad-report.streamlit.app/_stcore/health" || true

          echo "Ping sent at $(date -u)"
