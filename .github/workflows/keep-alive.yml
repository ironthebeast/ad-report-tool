name: Keep Streamlit App Alive

on:
  schedule:
    # 매 5분마다 실행 (GitHub Actions 최소 간격 고려)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Streamlit App
        env:
          APP_URL: "https://ad-report.streamlit.app/"
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=10
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRIES); do
            echo "=== Attempt $i / $MAX_RETRIES ==="

            # -L: 303 리다이렉트를 따라감 (Streamlit 세션 초기화)
            # -b/c: 쿠키를 저장/재사용하여 세션 유지
            HTTP_CODE=$(curl -s -L \
              -o /dev/null -w "%{http_code}" \
              --max-time 60 \
              --connect-timeout 15 \
              -b /tmp/streamlit_cookies -c /tmp/streamlit_cookies \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
              -H "Accept-Language: ko-KR,ko;q=0.9,en;q=0.8" \
              "$APP_URL" 2>&1) || HTTP_CODE="000"

            echo "HTTP Status: $HTTP_CODE"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "App is alive (HTTP $HTTP_CODE)"
              SUCCESS=true
              break
            fi

            echo "Ping failed (HTTP $HTTP_CODE), retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

          if [ "$SUCCESS" = false ]; then
            echo "::warning::App may be down after $MAX_RETRIES attempts (last HTTP $HTTP_CODE)"
          fi

      - name: Ping healthcheck endpoint
        env:
          APP_URL: "https://ad-report.streamlit.app/"
        run: |
          # _stcore/health 엔드포인트도 리다이렉트 따라가기
          HEALTH_CODE=$(curl -s -L \
            -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -b /tmp/streamlit_cookies -c /tmp/streamlit_cookies \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "${APP_URL}_stcore/health" 2>&1) || HEALTH_CODE="000"

          echo "Streamlit health check: HTTP $HEALTH_CODE"

      - name: Load app page (simulate real visit)
        env:
          APP_URL: "https://ad-report.streamlit.app/"
        run: |
          # 실제 브라우저처럼 HTML 본문까지 다운로드하여 앱 활성 상태 유지
          BODY_SIZE=$(curl -s -L \
            --max-time 60 \
            -b /tmp/streamlit_cookies -c /tmp/streamlit_cookies \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            "$APP_URL" 2>/dev/null | wc -c)

          echo "Page body size: ${BODY_SIZE} bytes"
          if [ "$BODY_SIZE" -gt 1000 ]; then
            echo "App page loaded successfully"
          else
            echo "::warning::App page seems too small (${BODY_SIZE} bytes) — may not be fully loaded"
          fi
